<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/Menu.css">
    <script src="../js/Menu.js" defer></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <h1>♕ PUPU CASINO ♛</h1>

    <div id="panel-login">
        <h2>Iniciar sesión</h2>
        <input type="text" id="login-usuario" placeholder="Usuario">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <p id="login-error" class="error"></p>
        <button onclick="iniciarSesion()">ENTRAR</button>
        <button class="secundario" onclick="mostrarPanel('panel-registro')">Crear cuenta</button>
    </div>

    <div id="panel-registro" class="hidden">
        <h2>Crear cuenta</h2>
        <input type="text" id="reg-usuario" placeholder="Usuario">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <input type="password" id="reg-pass2" placeholder="Repetir contraseña">
        <p id="reg-error" class="error"></p>
        <button onclick="registrar()">REGISTRARSE</button>
        <button class="secundario" onclick="mostrarPanel('panel-login')">Ya tengo cuenta</button>
    </div>
</div>

<!-- CASINO -->
<div id="casino-screen" class="hidden">

    <header>
        <div class="logo">♕ PUPU CASINO ♛</div>
        <div class="usuario">
            <span id="nombre-usuario"></span>
            <span id="saldo">10.000 €</span>
            <button onclick="cerrarSesion()">Salir</button>
        </div>
    </header>

    <div class="hero">
        <h1>LA FORTUNA<br>TE ESPERA</h1>
        <p>El casino favorito de todos.</p>
    </div>

    <div id="mensaje"></div>

    <div class="juegos">
        <div class="juego" onclick="jugar('Blackjack MegaPupu')">
            <span>🂡</span>
            <div>Blackjack MegaPupu</div>
        </div>
        <div class="juego" onclick="jugar('Ruleta MegaPupu')">
            <span>🎡</span>
            <div>Ruleta MegaPupu</div>
        </div>
        <div class="juego" onclick="jugar('Rolling Pupu\'s')">
            <span>🎰</span>
            <div>Rolling Pupu's</div>
        </div>
    </div>

    <footer>♠ ♥ ♦ ♣ — © 2026 PUPU Casino</footer>

    <!-- MODAL APUESTA -->
    <div id="modal" class="hidden">
        <div class="modal-box">
            <h3 id="modal-nombre"></h3>
            <p>Saldo disponible: <strong id="modal-saldo"></strong></p>
            <input type="number" id="input-apuesta" placeholder="Cantidad a llevar">
            <p id="error-apuesta" class="error"></p>
            <button onclick="confirmar()">ENTRAR</button>
            <button class="secundario" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

</div>

</body>
</html>
